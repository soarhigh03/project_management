<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="preauth">
  <div class="app">
    <header class="topbar">
      <a href="/" class="proj-name" id="projName" title="프로젝트 목록으로">…</a>
      <nav class="tabs">
        <div class="tab" data-tab="bugs">버그</div>
        <div class="tab" data-tab="features">기능</div>
      </nav>
      <div class="spacer"></div>
      <div class="me-box">
        <label for="meSelect">나:</label>
        <select id="meSelect"><option value="">선택 안 함</option></select>
      </div>
      <button class="btn ghost" id="logoutBtn" title="로그아웃">로그아웃</button>
    </header>
    <main class="main" id="main"></main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/bugs.js"></script>
  <script src="/js/features.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
