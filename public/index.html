<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskTrack — 프로젝트 선택</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="logo">Task<span class="accent">Track</span></div>

    <div class="login-card" id="card">
      <h2>프로젝트 선택</h2>
      <div class="proj-list" id="projList">
        <div class="empty-note">불러오는 중…</div>
      </div>
      <div class="hidden-proj">
        <button id="hiddenBtn">숨겨진 프로젝트 ID로 입장</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
